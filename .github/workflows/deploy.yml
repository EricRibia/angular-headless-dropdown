name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # IMPORTANT: base-href must match your repo name, with slashes.
      - run: npx ng build --configuration production --base-href /angular-headless-dropdown/
      - uses: actions/upload-pages-artifact@v3
        with:
          # Angular 17+ outputs to dist/<project>/browser
          path: dist/angular-headless-dropdown/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
