name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint --if-present

      - name: Test
        # Karma default: ChromeHeadless is preinstalled on ubuntu runners.
        # On the newer vitest/web-test-runner builder, drop the --browsers flag.
        run: pnpm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: pnpm run build
